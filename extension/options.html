<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Herbalis Agent — Configuración</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 460px; margin: 32px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 20px; }
    label { display: block; margin: 16px 0 4px; font-weight: 600; font-size: 14px; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 20px; padding: 10px 18px; background: #16a34a; color: #fff; border: 0; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .hint { color: #666; font-size: 12px; margin-top: 4px; }
    .ok { color: #16a34a; font-size: 14px; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Herbalis Agent</h1>
  <p class="hint">Conecta este WhatsApp Web con el panel. Pedile estos datos al administrador.</p>

  <label for="gatewayUrl">URL del gateway</label>
  <input id="gatewayUrl" placeholder="wss://tu-app.railway.app/agent" />
  <div class="hint">Empieza con <code>wss://</code> y termina en <code>/agent</code>.</div>

  <label for="sellerId">ID de vendedor</label>
  <input id="sellerId" placeholder="horacio" />

  <label for="token">Token</label>
  <input id="token" type="password" placeholder="••••••••" />

  <button id="save">Guardar y conectar</button>
  <div class="ok" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
